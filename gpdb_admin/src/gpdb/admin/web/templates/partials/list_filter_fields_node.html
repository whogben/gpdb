{# Node list filter fields. Expects: filter_form, sort_options #}
<label class="field">
  <span>Type</span>
  <input name="type" value="{{ filter_form.type }}">
</label>
 
<label class="field">
  <span>Parent ID</span>
  <input name="parent_id" value="{{ filter_form.parent_id }}">
</label>
 
<label class="field">
  <span>Filter (DSL)</span>
  <input name="filter" value="{{ filter_form.filter }}" placeholder="e.g. type = user and data.role = admin">
  <small class="field-hint">Optional. Leave empty to use the fields above. Same syntax as the API.</small>
</label>
 
<label class="field">
  <span>Sort</span>
  <select name="sort">
    {% for value, label in sort_options %}
    <option value="{{ value }}" {% if filter_form.sort == value %}selected{% endif %}>{{ label }}</option>
    {% endfor %}
  </select>
</label>
 
<label class="field">
  <span>Page size</span>
  <select name="limit">
    {% for option in (10, 20, 50, 100) %}
    <option value="{{ option }}" {% if filter_form.limit == option %}selected{% endif %}>{{ option }}</option>
    {% endfor %}
  </select>
</label>
