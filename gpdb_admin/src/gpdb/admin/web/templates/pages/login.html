{% extends "base.html" %}

{% block content %}
<section class="auth-layout">
  <div class="auth-copy">
    <p class="eyebrow">Sign In</p>
    <h1>Log in to GPDB admin.</h1>
    <p class="hero-text">
      The initial owner account has been created. Continue with username and password
      to access the web UI.
    </p>
  </div>

  <div class="auth-card">
    <h2>Login</h2>
    <form class="auth-form" action="{{ mount_prefix }}{{ web_app.url_path_for('login_submit') }}" method="post">
      <label class="field">
        <span>Username</span>
        <input name="username" value="{{ (form_data or {}).get('username', '') }}" required>
      </label>
      <label class="field">
        <span>Password</span>
        <input name="password" type="password" required>
      </label>
      <button class="button" type="submit">Sign in</button>
    </form>
  </div>
</section>
{% endblock %}
